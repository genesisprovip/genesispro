<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago Cancelado - GenesisPro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e4e8f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(244, 67, 54, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #F44336;
    }
    p {
      font-size: 16px;
      color: #8b95a8;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #c8a951, #e6c766);
      color: #0a0f1a;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.03); }
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: #5a6478;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#10007;</div>
    <h1>Pago Cancelado</h1>
    <p>El proceso de pago fue cancelado. No se realizo ningun cargo. Puedes intentar de nuevo cuando quieras.</p>
    <a href="genesispro://subscription" class="btn">Volver a la App</a>
    <p class="note">Si el boton no abre la app, abrela manualmente.</p>
  </div>
</body>
</html>
