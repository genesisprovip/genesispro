# GenesisPro - Initial config (HTTP only, for SSL certificate generation)
# This config is used ONLY during first deploy to get Let's Encrypt certificates
# After certificates are obtained, switch to production.conf

server {
    listen 80;
    server_name api.genesispro.vip;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy (temporary HTTP)
    location /api/ {
        proxy_pass http://genesispro-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://genesispro-api:3000/health;
    }
}

server {
    listen 80;
    server_name genesispro.vip;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Dashboard (temporary HTTP)
    location /palenque {
        alias /var/www/dashboard;
        index index.html;
        try_files $uri $uri/ /var/www/dashboard/index.html;
    }

    location = / {
        return 302 /palenque;
    }
}
