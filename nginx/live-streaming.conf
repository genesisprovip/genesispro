# ===== live.genesispro.vip (Live Streaming via OME) =====
# This file is included in active.conf after SSL cert is issued.
# To enable: add "include /etc/nginx/conf.d/live-streaming.conf;" at the end of active.conf

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name live.genesispro.vip;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for live streaming
server {
    listen 443 ssl http2;
    server_name live.genesispro.vip;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/live.genesispro.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.genesispro.vip/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # CORS headers for all responses
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Range" always;

    # HLS/LL-HLS proxy to OvenMediaEngine
    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Range";
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        proxy_pass http://genesispro-ome:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for low-latency streaming
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts for long-lived connections
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Cache headers for HLS manifests (short TTL for live)
    location ~* \.m3u8$ {
        proxy_pass http://genesispro-ome:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Cache headers for TS/CMAF segments (cacheable by CDN)
    location ~* \.(ts|m4s|mp4)$ {
        proxy_pass http://genesispro-ome:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=60" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
