# GenesisPro - Nginx Production Config

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# ===== api.genesispro.vip =====

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.genesispro.vip;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name api.genesispro.vip;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.genesispro.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.genesispro.vip/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max body size for uploads
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://genesispro-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check
    location = /health {
        proxy_pass http://genesispro-api:3000/health;
    }

    # Event share page (Open Graph for WhatsApp/social)
    location /evento/ {
        proxy_pass http://genesispro-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fight result share page (Open Graph for WhatsApp/social)
    location /resultado/ {
        proxy_pass http://genesispro-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Palenque Dashboard (also accessible via api subdomain)
    location /palenque {
        alias /var/www/dashboard;
        index index.html;
        try_files $uri $uri/ /var/www/dashboard/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static uploads (read-only from volume)
    location /uploads {
        alias /var/www/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ===== live.genesispro.vip (OvenMediaEngine LLHLS Streaming) =====

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name live.genesispro.vip;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS proxy to OvenMediaEngine LLHLS + WebRTC signaling
server {
    listen 443 ssl;
    server_name live.genesispro.vip;

    ssl_certificate /etc/letsencrypt/live/live.genesispro.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.genesispro.vip/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebRTC signaling (WebSocket) proxy to OME port 3334
    location /ws/ {
        proxy_pass http://genesispro-ome:3334/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        add_header Access-Control-Allow-Origin "*" always;
    }

    # LLHLS streaming proxy to OvenMediaEngine port 3333
    location /live/ {
        proxy_pass http://genesispro-ome:3333/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for mobile app
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Location" always;

        # Disable buffering for low-latency streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # Chunked transfer for LLHLS
        chunked_transfer_encoding on;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Length 0;
            add_header Content-Type "text/plain charset=UTF-8";
            return 204;
        }
    }

    location = / {
        return 200 '{"service":"GenesisPro Live Streaming","status":"ok"}';
        add_header Content-Type application/json;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

